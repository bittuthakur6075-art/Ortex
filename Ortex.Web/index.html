    <!-- Google Analytics, Clarity, & Search Console Loader -->
    <script>
      (function() {
        const gaId = "%VITE_GA_MEASUREMENT_ID%";
        const clarityId = "%VITE_CLARITY_ID%";
        const gscId = "%VITE_GSC_VERIFICATION_CODE%";

        // GSC Verification
        if (gscId && gscId !== "%" + "VITE_GSC_VERIFICATION_CODE%" && gscId.trim() !== "") {
          const meta = document.createElement("meta");
          meta.name = "google-site-verification";
          meta.content = gscId;
          document.head.appendChild(meta);
        }

        // Google Analytics 4
        if (gaId && gaId !== "%" + "VITE_GA_MEASUREMENT_ID%" && gaId.trim() !== "") {
          const s1 = document.createElement("script");
          s1.async = true;
          s1.src = "https://www.googletagmanager.com/gtag/js?id=" + gaId;
          document.head.appendChild(s1);

          const s2 = document.createElement("script");
          s2.text = "window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', '" + gaId + "', { page_path: window.location.pathname });";
          document.head.appendChild(s2);
        }

        // Microsoft Clarity
        if (clarityId && clarityId !== "%" + "VITE_CLARITY_ID%" && clarityId.trim() !== "") {
          const s3 = document.createElement("script");
          s3.text = "(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src='https://www.clarity.ms/tag/'+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);})(window,document,'clarity','script','" + clarityId + "');";
          document.head.appendChild(s3);
        }
      })();
    </script>
